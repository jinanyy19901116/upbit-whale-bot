version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: rotation_postgres
    restart: always
    environment:
      POSTGRES_DB: rotation
      POSTGRES_USER: rotation_user
      POSTGRES_PASSWORD: rotation_pass
      TZ: Asia/Singapore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rotation_user -d rotation"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: rotation_app
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      TZ: Asia/Singapore
      PORT: 8080
      DATABASE_URL: postgresql://rotation_user:rotation_pass@postgres:5432/rotation
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
